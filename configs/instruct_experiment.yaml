# Full experiment with Instruct model for MCTS
# Phase 1: Qwen2.5-Math-7B-Instruct (stronger search)
# Phase 2: GPT-5 Mini (analysis + synthesis)

mcts_model:
  name_or_path: "Qwen/Qwen2.5-Math-7B-Instruct"
  backend: "vllm"
  tensor_parallel_size: 1

analysis_model:
  name_or_path: "gpt-5-mini"
  backend: "anthropic"
  api_base_url: "${ANTHROPIC_BASE_URL}"
  api_key: "${ANTHROPIC_API_KEY}"

synthesis_model:
  name_or_path: "gpt-5-mini"
  backend: "anthropic"
  api_base_url: "${ANTHROPIC_BASE_URL}"
  api_key: "${ANTHROPIC_API_KEY}"

mcts:
  c_puct: 1.4
  max_depth: 16
  max_actions_per_node: 3
  num_rollouts: 10
  temperature: 0.7
  expand_max_tokens: 256
  simulate_max_tokens: 2048
  batch_size: 8

trajectory:
  contrastive_pairs_per_problem: 10

synthesis:
  temperature: 0.0
  max_tokens: 2048

analysis:
  temperature: 0.7
  max_tokens: 1024

dataset:
  seed_data:
    - name: "gsm8k"
      path: "openai/gsm8k"
      split: "train"
      subset: "main"
    - name: "math"
      path: "DigitalLearningGmbH/MATH-lighteval"
      split: "train"
  target_size: 30000
  output_dir: "./data/instruct_experiment"
